name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install libbsd-dev
        run: sudo sh -c 'apt-get update && apt-get install -y libbsd-dev'
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo build --verbose
      - run: cargo test --verbose

  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flags: ["", "--all-features"]
    steps:
      - uses: actions/checkout@v6
      - name: Install libbsd-dev
        run: sudo sh -c 'apt-get update && apt-get install -y libbsd-dev'
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --verbose ${{ matrix.flags }}
      - run: cargo test --verbose ${{ matrix.flags }}

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --verbose
      - run: cargo test --verbose

  freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y rust
          run: |
            cargo build --verbose
            cargo test --verbose

  openbsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and test on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg_add rust
          run: |
            cargo build --verbose
            cargo test --verbose

  netbsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build and test on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          prepare: |
            /usr/sbin/pkg_add rust
          run: |
            cargo build --verbose
            cargo test --verbose

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install libbsd-dev
        run: sudo apt-get update && sudo apt-get install -y libbsd-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
